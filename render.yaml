services:
  - type: web
    name: profe-ia-tita
    env: node
    region: oregon          # Cambia a "frankfurt" si quieres más cerca de Chile
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render te pedirá el valor manualmente (no queda en el repo)
    healthCheckPath: /api/health
